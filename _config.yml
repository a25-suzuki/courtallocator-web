# Feature List
features:
  - title: かんたんペア決め
    description: 参加者を入力するだけで、ランダムかつ公平なペアを自動生成。面倒なくじ引きが不要に。
    fontawesome_icon_name: random

  - title: コート割り自動化
    description: 複数コートへの組み合わせ割り当てをワンタップで完了。練習開始までの時間を短縮。
    fontawesome_icon_name: th-large

  - title: 参加者管理
    description: メンバーリストを保存・編集できるので、毎回入力する手間がありません。
    fontawesome_icon_name: users

  - title: 履歴機能
    description: 過去のペアリング履歴を保存。同じ組み合わせを避けるための参考にも活用できます。
    fontawesome_icon_name: history

  - title: シンプルなUI
    description: 直感的で見やすいデザインを採用。年齢を問わず誰でも迷わず操作できます。
    fontawesome_icon_name: magic

